global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "uptime"
    scrape_interval: 30s
    metrics_path: "/metrics"
    authorization:
      credentials: "uk3_NWc1HKxNwfbTO5XoXNSo-JV8TTADGXjvn9e_kYWy"
    static_configs:
      - targets: ["172.17.0.1:3001"]

  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
