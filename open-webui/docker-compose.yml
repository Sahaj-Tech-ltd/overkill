services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_SECRET_KEY=bc266bbed94de2138bf3f194f42665a6abce969506395bd464e7d920c2e25ee7
      - DEFAULT_MODELS=glm-4.7-flash
      - OPENAI_API_BASE_URL=https://api.z.ai/api/paas/v4
      - OPENAI_API_KEY=54d8aece2bc94757900ee3ab94b3842d.yjPDfYdJMHJPTbms
    ports:
      - "127.0.0.1:3030:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  open-webui-data:
