name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: [bug, triage]
assignees: [xyzmr114]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checks
      description: Please confirm the following before submitting
      options:
        - label: I am running the latest version of Overkill
          required: true
        - label: I have checked the documentation and found no relevant information
          required: true
        - label: I have searched existing issues and found no duplicate
          required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Run `overkill ...`
        2. With config ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Details about your setup
      value: |
        - OS:
        - Go version:
        - Overkill version:
      render: markdown
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - S0-Critical (system unusable, data loss)
        - S1-High (major feature broken)
        - S2-Medium (feature degraded, workaround exists)
        - S3-Low (minor inconvenience)
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, or other evidence that helps explain the issue
      placeholder: Paste relevant log output or drag-and-drop screenshots here
    validations:
      required: false
