name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly Sunday 00:00 UTC.
    - cron: "0 0 * * 0"

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    defaults:
      run:
    defaults:
      run:
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: |
          # `.gosec-ignore` lists rule IDs (one per line, # for comments) to skip.
          excludes=""
          if [ -f .gosec-ignore ]; then
            ids=$(grep -v '^\s*#' .gosec-ignore | grep -v '^\s*$' | paste -sd, -)
            [ -n "$ids" ] && excludes="-exclude=$ids"
          fi
          gosec -no-fail -fmt=sarif -out=gosec.sarif $excludes ./... || true
          gosec $excludes ./... || true
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: |
          # `.govulncheck-ignore` lists vulnerability IDs (e.g. GO-2024-1234)
          # to filter out of the failure set, one per line.
          if [ -f .govulncheck-ignore ]; then
            ignored=$(grep -v '^\s*#' .govulncheck-ignore | grep -v '^\s*$' || true)
          else
            ignored=""
          fi
          govulncheck -json ./... > govulncheck.json || true

          # Count called vs uncalled for summary.
          called_count=$(jq '[.[] | select(.osv and .finding)] | length' govulncheck.json 2>/dev/null || echo 0)
          uncalled_count=$(jq '[.[] | select(.osv and (.finding | not))] | length' govulncheck.json 2>/dev/null || echo 0)
          echo "govulncheck: ${called_count} called, ${uncalled_count} uncalled (in dependency tree only)"

          # Only fail on CALLED vulns — uncalled means the vulnerable code is
          # in the module graph but never reached from our code. govulncheck
          # reports both but the "finding" field is only present for reachable vulns.
          fail=0
          while IFS= read -r line; do
            id=$(echo "$line" | jq -r '.osv.id // empty' 2>/dev/null || true)
            [ -z "$id" ] && continue
            if echo "$ignored" | grep -Fxq "$id"; then
              echo "::notice::Ignoring $id (listed in .govulncheck-ignore)"
              continue
            fi
            echo "::error::CALLED vulnerability $id"
            fail=1
          done < <(jq -c 'select(.osv and .finding)' govulncheck.json 2>/dev/null || true)

          # Print uncalled as notices (informational, not blocking).
          while IFS= read -r line; do
            id=$(echo "$line" | jq -r '.osv.id // empty' 2>/dev/null || true)
            [ -z "$id" ] && continue
            echo "::notice::Uncalled $id (in dependency tree but not reached)"
          done < <(jq -c 'select(.osv and (.finding | not))' govulncheck.json 2>/dev/null || true)

          # Always print human report for context.
          govulncheck ./... || true
          exit $fail

  codeql-trigger:
    # Marker job that always passes; CodeQL has its own workflow now.
    name: codeql trigger
    runs-on: ubuntu-latest
    steps:
      - run: echo "CodeQL runs in codeql.yml"

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Non-blocking: secret scanning produces false positives on test
    # fixtures and embedded test keys. go test is the hard gate.
    # Uses the free gitleaks CLI (no license needed) instead of the
    # gitleaks-action which requires a paid license as of v2.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --verbose --redact --no-git

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v5

  # Supply-chain audit lives in supply-chain-audit.yml. Splitting it out
  # means a "supply-chain failed" status on a PR is unambiguous — readers
  # don't have to scan the security log to see whether the failure was
  # gosec, govulncheck, gitleaks, or pip-audit.
