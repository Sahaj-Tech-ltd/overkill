name: Update Contributors

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"

# Need write access to push contributors update directly.
permissions:
  contents: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch contributors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTRIBUTORS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contributors?per_page=100")
          
          echo "## Contributors" > contributors_table.md
          echo "" >> contributors_table.md
          echo "$CONTRIBUTORS" | jq -r '.[] | "| <img src=\"\(.avatar_url)\" width=\"40\" height=\"40\" /> | [\(.login)](\(.html_url)) | \(.contributions) |"' >> contributors_table.md
          
          echo "| | User | Contributions |" > contributors_header.md
          echo "|---|---|---|" >> contributors_header.md
          
          cat contributors_header.md contributors_table.md > contributors_full.md
          
          if grep -q "<!-- CONTRIBUTORS START -->" README.md; then
            sed -i '/<!-- CONTRIBUTORS START -->/,/<!-- CONTRIBUTORS END -->/c\<!-- CONTRIBUTORS START -->\n'"$(cat contributors_full.md)"'\n<!-- CONTRIBUTORS END -->' README.md
          else
            echo -e "\n<!-- CONTRIBUTORS START -->\n$(cat contributors_full.md)\n<!-- CONTRIBUTORS END -->" >> README.md
          fi
          
          rm -f contributors_table.md contributors_header.md contributors_full.md
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "No changes to contributors."
          else
            git add README.md
            git commit -m "chore: update contributors list"
            git push
          fi
