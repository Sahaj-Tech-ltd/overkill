name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.25"

jobs:
  # Build-correctness gates: gofmt, vet, and a native+cross-target build
  # sanity check. The actual test suite (Go race tests + Python pytest)
  # lives in tests.yml so a red test doesn't get buried under build logs
  # and so result-watchers can subscribe to tests specifically.
  lint-build:
    name: Lint + build (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download modules
        run: go mod download
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Build
        run: go build ./...

  # Cross-compile sanity check on the other supported targets.
  cross-build:
    name: Cross build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.Version=ci-${{ github.sha }}" \
            -o /tmp/overkill-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/overkill
