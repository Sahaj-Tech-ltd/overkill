name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  GOLANGCI_LINT_VERSION: "v2.12.1"
  GOTOOLCHAIN: auto

jobs:
  go-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prod
    defaults:
      run:
        working-directory: prod
    defaults:
      run:
        working-directory: prod
    timeout-minutes: 10
    # Non-blocking quality gate — golangci-lint version compatibility with
    # bleeding-edge Go toolchains is brittle. go vet is the hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run golangci-lint
        run: |
          curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/v2.12.1/golangci-lint-2.12.1-linux-amd64.tar.gz" | tar xz -C /tmp
          /tmp/golangci-lint-2.12.1-linux-amd64/golangci-lint run --timeout=5m ./... || true

  go-vet:
    name: go vet
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go vet ./...

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod / go.sum are not tidy. Run 'go mod tidy' locally."
            git --no-pager diff go.mod go.sum
            exit 1
          fi

  no-binaries:
    name: No committed binaries
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for ELF / Mach-O binaries
        run: |
          set -e
          bad=""
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            # Skip obvious binary asset paths we accept (none right now).
            head_bytes=$(head -c 4 "$f" | od -An -c | tr -d ' \n')
            case "$head_bytes" in
              "\\177ELF"*) bad="$bad $f" ;;
              "\\312\\376\\272\\276"*) bad="$bad $f" ;;  # Mach-O 32 BE
              "\\316\\372\\355\\376"*) bad="$bad $f" ;;  # Mach-O 64 LE
              "\\317\\372\\355\\376"*) bad="$bad $f" ;;  # Mach-O 64 LE alt
            esac
          done < <(git ls-files)
          if [ -n "$bad" ]; then
            echo "::error::Committed binaries detected:$bad"
            exit 1
          fi
          echo "No committed binaries found."

  python-lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check prod/bridge/
