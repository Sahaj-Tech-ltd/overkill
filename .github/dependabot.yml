version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - ci
      - dependencies
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /bridge
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    groups:
      pip-minor-patch:
        update-types:
          - minor
          - patch
