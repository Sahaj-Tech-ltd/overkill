<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1e2e" />
  <title>ethos</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23cba6f7'/><text x='16' y='22' font-family='ui-sans-serif' font-size='18' font-weight='700' text-anchor='middle' fill='%231e1e2e'>e</text></svg>" />
</head>
<body data-theme="dark">
  <div id="app">
    <aside id="sidebar" class="sidebar" aria-label="Sessions">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark">e</span>
          <span class="brand-name">ethos</span>
        </div>
        <button id="new-session" class="ghost-btn" title="New session" aria-label="New session">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
      <div id="session-list" class="session-list" role="list"></div>
      <div class="sidebar-foot">
        <span class="hint">v<span id="version">…</span></span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="menu-toggle" class="icon-btn mobile-only" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div class="topbar-meta">
          <span id="conn-dot" class="conn-dot" data-state="idle" title="Connecting…"></span>
          <span id="provider-label" class="muted">—</span>
          <span class="sep">·</span>
          <span id="model-label" class="model">—</span>
        </div>
        <div class="topbar-actions">
          <button id="cancel-btn" class="ghost-btn danger hidden" title="Cancel">stop</button>
          <button id="settings-btn" class="icon-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.3 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.3l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
          </button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer" autocomplete="off">
        <textarea id="input" name="input" rows="1" placeholder="Message ethos…" spellcheck="true"></textarea>
        <button type="submit" id="send-btn" class="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </form>
    </main>
  </div>

  <div id="settings-pop" class="popover hidden" role="dialog" aria-label="Settings">
    <div class="pop-row">
      <label>Model</label>
      <select id="model-select"></select>
    </div>
    <div class="pop-row">
      <label>Theme</label>
      <button id="theme-toggle" class="ghost-btn">toggle</button>
    </div>
    <div class="pop-row">
      <button id="logout-btn" class="ghost-btn danger">forget token</button>
    </div>
  </div>

  <div id="token-modal" class="modal hidden" role="dialog" aria-label="Auth required">
    <div class="modal-body">
      <h2>Authentication required</h2>
      <p class="muted">Paste your bearer token from <code>~/.ethos/web-token</code>.</p>
      <input id="token-input" type="text" placeholder="bearer token" autocomplete="off" />
      <button id="token-submit" class="primary-btn">connect</button>
    </div>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
