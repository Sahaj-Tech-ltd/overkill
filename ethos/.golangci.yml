# golangci-lint config for ethos.
# Pinned-version invocation lives in .github/workflows/lint.yml.

run:
  timeout: 5m
  go: "1.22"
  tests: true
  build-tags: []

issues:
  exclude-dirs:
    - internal/highlight
    - examples
    - bridge
    - inspiration
    - research
    - vendor
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Long lines are tolerated in tests (table-driven tests, fixtures).
    - path: _test\.go
      linters:
        - lll
    # `_ = something` is an intentional ignore — don't flag it.
    - linters:
        - errcheck
      text: "Error return value is not checked"
      source: "^\\s*_\\s*=\\s*"

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  # Disabled (noisy or stylistic):
  #   lll, wsl, funlen, gocyclo

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/Sahaj-Tech-ltd/ethos
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
  misspell:
    locale: US
  staticcheck:
    checks:
      - all
      - -ST1000  # missing package doc not required everywhere
      - -ST1003  # naming style — handled separately
