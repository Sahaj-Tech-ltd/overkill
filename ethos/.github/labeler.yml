# Auto-label PRs by changed file paths. Consumed by .github/workflows/labeler.yml.

tui:
  - changed-files:
      - any-glob-to-any-file: pkg/tui/**

agent:
  - changed-files:
      - any-glob-to-any-file: internal/agent/**

providers:
  - changed-files:
      - any-glob-to-any-file: internal/providers/**

tools:
  - changed-files:
      - any-glob-to-any-file: internal/tools/**

plugins:
  - changed-files:
      - any-glob-to-any-file:
        - internal/plugin/**
        - examples/plugins/**

docs:
  - changed-files:
      - any-glob-to-any-file:
        - "**/*.md"
        - docs/**

ci:
  - changed-files:
      - any-glob-to-any-file: .github/**

security:
  - changed-files:
      - any-glob-to-any-file:
        - internal/security/**
        - internal/auth/**

bridge:
  - changed-files:
      - any-glob-to-any-file: bridge/**

skills:
  - changed-files:
      - any-glob-to-any-file:
        - skills/**
        - optional-skills/**
