name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.25"

jobs:
  # Native build + tests (gofmt, vet, race tests) on Linux.
  test:
    name: Test (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download modules
        run: go mod download
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: go test -race -count=1 -timeout=5m ./...

  # Cross-compile sanity check on the other supported targets.
  cross-build:
    name: Cross build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.Version=ci-${{ github.sha }}" \
            -o /tmp/ethos-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ethos
