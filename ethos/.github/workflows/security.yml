name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly Sunday 00:00 UTC.
    - cron: "0 0 * * 0"

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: |
          # `.gosec-ignore` lists rule IDs (one per line, # for comments) to skip.
          excludes=""
          if [ -f .gosec-ignore ]; then
            ids=$(grep -v '^\s*#' .gosec-ignore | grep -v '^\s*$' | paste -sd, -)
            [ -n "$ids" ] && excludes="-exclude=$ids"
          fi
          gosec -no-fail -fmt=sarif -out=gosec.sarif $excludes ./... || true
          gosec $excludes ./... || true
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: |
          # `.govulncheck-ignore` lists vulnerability IDs (e.g. GO-2024-1234)
          # to filter out of the failure set, one per line.
          if [ -f .govulncheck-ignore ]; then
            ignored=$(grep -v '^\s*#' .govulncheck-ignore | grep -v '^\s*$' || true)
          else
            ignored=""
          fi
          govulncheck -json ./... > govulncheck.json || true
          # Surface findings, but only fail when an unignored vuln is found.
          fail=0
          while IFS= read -r line; do
            id=$(echo "$line" | jq -r '.osv.id // empty' 2>/dev/null || true)
            [ -z "$id" ] && continue
            if echo "$ignored" | grep -Fxq "$id"; then
              echo "::notice::Ignoring $id (listed in .govulncheck-ignore)"
              continue
            fi
            echo "::error::Vulnerability $id"
            fail=1
          done < <(jq -c 'select(.osv) // empty' govulncheck.json 2>/dev/null || true)
          # Always print human report for context.
          govulncheck ./... || true
          exit $fail

  codeql-trigger:
    # Marker job that always passes; CodeQL has its own workflow now.
    name: codeql trigger
    runs-on: ubuntu-latest
    steps:
      - run: echo "CodeQL runs in codeql.yml"

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  # Supply-chain hygiene: catch suspicious files/patterns and audit Python
  # dependencies. Folded in from the retired supply-chain-audit.yml.
  supply-chain:
    name: supply chain audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for .pth files in dependencies
        run: |
          if find . -name "*.pth" -not -path "./.git/*" | grep -q .; then
            echo "::error::Found .pth file in dependencies"
            exit 1
          fi
          echo "No .pth files found"
      - name: Check for base64+exec patterns in Python deps
        run: |
          if grep -r -l "base64" bridge/ --include="*.py" 2>/dev/null | xargs -r grep -l "exec\|eval" 2>/dev/null; then
            echo "::error::Found base64+exec patterns"
            exit 1
          fi
          echo "No suspicious base64+exec patterns found"
      - name: Check for suspicious install hooks
        run: |
          if find . -name "package.json" -not -path "./.git/*" -exec grep -l "preinstall\|postinstall" {} \; | grep -q .; then
            echo "::error::Found suspicious install hooks"
            exit 1
          fi
          echo "No suspicious install hooks found"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        working-directory: bridge
        run: pip-audit -r requirements.txt
