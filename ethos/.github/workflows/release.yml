name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build overkill
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          out="dist/overkill-${VERSION}-${GOOS}-${GOARCH}"
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "${out}" ./cmd/overkill

      - name: Build example plugins
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          for plugin in notes git-stats; do
            out="dist/overkill-plugin-${plugin}-${VERSION}-${GOOS}-${GOARCH}"
            if [ -d "examples/plugins/${plugin}" ]; then
              go build -trimpath -ldflags="-s -w" \
                -o "${out}" "./examples/plugins/${plugin}"
            fi
          done

      - name: Generate checksums
        working-directory: dist
        run: |
          for f in *; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: overkill-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage installer + plugin sources
        run: |
          cp install.sh dist/install.sh
          tar czf dist/overkill-plugins-src-${{ github.ref_name }}.tar.gz \
            -C examples plugins

      - name: Aggregate SHA256SUMS
        working-directory: dist
        run: |
          # Drop per-file .sha256 stubs into one combined SHA256SUMS file.
          rm -f SHA256SUMS
          for f in *; do
            case "$f" in
              *.sha256|SHA256SUMS) continue ;;
            esac
            sha256sum "$f" >> SHA256SUMS
          done
          # Remove individual .sha256 stubs once aggregated.
          rm -f *.sha256

      - name: Generate changelog
        id: changelog
        run: |
          prev=$(git tag --sort=-v:refname | grep -v "^${{ github.ref_name }}$" | head -1 || true)
          {
            echo "## Changes"
            echo
            if [ -n "$prev" ]; then
              git log --pretty=format:'- %s (%h)' "${prev}..${{ github.ref_name }}"
            else
              git log --pretty=format:'- %s (%h)' "${{ github.ref_name }}"
            fi
          } > CHANGELOG_RELEASE.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
