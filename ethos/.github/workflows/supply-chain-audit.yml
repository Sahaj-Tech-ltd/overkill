name: Supply Chain Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for .pth files in dependencies
        run: |
          find . -name "*.pth" -not -path "./.git/*" | head -n 1 && echo "::error::Found .pth file in dependencies" && exit 1 || echo "No .pth files found"
      - name: Check for base64+exec patterns in Python deps
        run: |
          if grep -r -l "base64" bridge/ --include="*.py" | xargs grep -l "exec\|eval" 2>/dev/null; then
            echo "::error::Found base64+exec patterns"
            exit 1
          fi
          echo "No suspicious base64+exec patterns found"
      - name: Check for suspicious install hooks
        run: |
          find . -name "package.json" -not -path "./.git/*" -exec grep -l "preinstall\|postinstall" {} \; | head -n 1 && echo "::error::Found suspicious install hooks" && exit 1 || echo "No suspicious install hooks found"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        working-directory: bridge
        run: pip-audit -r requirements.txt
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
