version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      go-all:
        update-types:
          - minor
          - patch
  - package-ecosystem: pip
    directory: /bridge
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    labels:
      - dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 1
    labels:
      - ci
      - dependencies
