version: "3.8"

services:
  overkill:
    build: .
    container_name: overkill
    environment:
      - OVERKILL_CONFIG=/workspace/.overkill/config.toml
    volumes:
      - .:/workspace
      - overkill-data:/home/overkill/.overkill
    working_dir: /workspace
    stdin_open: true
    tty: true

  qdrant:
    image: qdrant/qdrant:latest
    container_name: overkill-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    profiles:
      - vector

volumes:
  overkill-data:
  qdrant-data:
