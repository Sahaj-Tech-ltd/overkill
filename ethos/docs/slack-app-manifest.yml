# Ethos — Slack app manifest.
#
# Paste this at https://api.slack.com/apps → "Create New App" → "From a manifest"
# to provision the bot in your workspace. After installing:
#
#   1. Settings → Basic Information → "App-Level Tokens": generate a new token
#      with the `connections:write` scope. This is your SLACK_APP_TOKEN
#      (xapp-...).
#   2. Settings → Install App: install to your workspace; copy the "Bot User
#      OAuth Token". This is your SLACK_BOT_TOKEN (xoxb-...).
#   3. Configure ethos:
#        [slack]
#        enabled = true
#        app_token = "xapp-..."
#        bot_token = "xoxb-..."
#      (or export SLACK_APP_TOKEN / SLACK_BOT_TOKEN env vars).
#   4. Run `ethos slack`. The bot will respond to @mentions in channels it is
#      invited to and to direct messages.
#
# Tokens MUST be kept secret. Never commit them. Rotate immediately if leaked.
display_information:
  name: Ethos
  description: Self-hosted Ethos coding agent in your workspace.
  background_color: "#1e1e2e"
features:
  bot_user:
    display_name: Ethos
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - chat:write.public
      - im:history
      - im:read
      - im:write
      - reactions:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
