services:
  docuseal:
    image: docuseal/docuseal:latest
    container_name: docuseal
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "3002:3000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - WORKDIR=/data
      - DOCUSEAL_HOST=https://sign.databunker.uk
      - RAILS_MAX_THREADS=5
      - SIDEKIQ_THREADS=3
      - LOG_LEVEL=error
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
