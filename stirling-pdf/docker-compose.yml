services:
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    restart: "no"
    ports:
      - "8080:8080"
    volumes:
      - ./trainingData:/usr/share/tessdata
      - ./extraConfigs:/configs
      - ./logs:/logs
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - INSTALL_BOOK_AND_ADVANCED_HTML_OPS=false
      - LANGS=en_US
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/api/v1/info -o /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
